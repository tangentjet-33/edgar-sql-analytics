name: edgar
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - psycopg[binary]=3.2  # psycopg3, modern Postgres driver
  - sqlalchemy=2.0
  - pandas=2.2
  - requests=2.32
  - tqdm=4.66            # progress bars for ingestion
  - python-dotenv=1.0    # for DB connection config
  - pytest=8.2           # for any validation tests you write
  # Notebook layer (optional, install now to avoid env churn later)
  - jupyterlab=4.2
  - matplotlib=3.9
  - seaborn=0.13
  - pip:
      - ruff==0.6.9      # linter